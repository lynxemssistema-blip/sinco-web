<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINCO-WEB | Bem-vindo</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        body {
            background-color: var(--color-brand-dark);
            color: var(--text-inverse);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .hero-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: var(--space-xl);
            background: radial-gradient(circle at top right, #4d665e, var(--color-brand-dark));
        }

        .brand-display {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: var(--space-md);
            color: var(--text-inverse);
        }

        .brand-tagline {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin-bottom: var(--space-2xl);
            line-height: 1.6;
        }

        .geometric-accent {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            pointer-events: none;
        }

        .geometric-accent-2 {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            top: 20%;
            left: 10%;
            transform: rotate(45deg);
            pointer-events: none;
        }

        .actions {
            display: flex;
            gap: var(--space-md);
        }

        .btn-light-outline {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .btn-light-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: white;
        }

        footer {
            padding: var(--space-lg);
            text-align: center;
            font-size: 0.875rem;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div class="geometric-accent"></div>
    <div class="geometric-accent-2"></div>

    <main class="hero-section">
        <h1 class="brand-display">SISTEMA LYNX</h1>
        <p class="brand-tagline">
            Precisão, elegância e performance. <br>
            A solução abrangente para gestão do SINCO-WEB.
        </p>

        <div class="actions">
            <a href="login.html" class="btn"
                style="background-color: var(--color-brand-accent); color: var(--color-brand-dark);">
                Acessar Sistema
            </a>
            <a href="#" class="btn btn-light-outline">Saiba Mais</a>
        </div>
    </main>

    <footer>
        &copy; 2026 SINCO-WEB baseado no Lynx Design System. Todos os direitos reservados.
    </footer>
</body>

</html>
