<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINCO WEB - LynxEMS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.7);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.15) 0px, transparent 50%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-text {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-light);
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .form-input:focus + .form-label {
            color: var(--primary);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 14px 0 rgba(59, 130, 246, 0.39);
        }

        .btn-login:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .error-msg {
            color: #ef4444;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-container">
            <h1 class="logo-text">SINCO WEB</h1>
            <p class="subtitle">Acesso ao Sistema de Gestão</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="username">Usuário</label>
                <input type="text" id="username" class="form-input" placeholder="Digite seu usuário" required autocomplete="username">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Senha</label>
                <input type="password" id="password" class="form-input" placeholder="Digite sua senha" required autocomplete="current-password">
            </div>

            <div id="errorMessage" class="error-msg"></div>

            <button type="submit" id="btnSubmit" class="btn-login">
                <span id="btnText">Entrar no Sistema</span>
                <div id="btnSpinner" class="spinner"></div>
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            const btnSubmit = document.getElementById('btnSubmit');
            const errorMessage = document.getElementById('errorMessage');

            // Reset error
            errorMessage.style.display = 'none';

            // Loading state
            btnText.style.display = 'none';
            btnSpinner.style.display = 'block';
            btnSubmit.disabled = true;

            const creds = {
                username: usernameInput.value.trim(),
                password: passwordInput.value.trim()
            };

            // URL DA API (APONTANDO PARA O SEU VPS) 
            const API_URL = 'http://85.31.60.68:5000/api/login'; 

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(creds)
                });

                if (response.ok) {
                    const data = await response.json();
                    // Salva os dados localmente como o frontend em React faz
                    localStorage.setItem('user', JSON.stringify(data.user || data));
                    if(data.token) localStorage.setItem('token', data.token);
                    
                    // Sucesso visual
                    btnSpinner.style.display = 'none';
                    btnText.style.display = 'block';
                    btnText.textContent = 'Sucesso! Redirecionando...';
                    btnSubmit.style.background = '#10b981'; // Verde
                    
                    // AQUI É O "E DEPOIS SEGUE NORMAL"
                    // Redireciona para o painel na Hostinger onde estaria a aplicacao final ou recarrega a página certa
                    setTimeout(() => {
                        // Substitua index.html pela URL real do painel do seu app construído
                        window.location.href = '/dashboard'; // ou index.html
                    }, 1000);

                } else {
                    throw new Error('Usuário ou senha incorretos.');
                }
            } catch (error) {
                // Return to normal state
                btnSpinner.style.display = 'none';
                btnText.style.display = 'block';
                btnSubmit.disabled = false;
                
                errorMessage.textContent = 'Erro ao conectar. ' + error.message;
                errorMessage.style.display = 'block';
            }
        });
    </script>
</body>
</html>
